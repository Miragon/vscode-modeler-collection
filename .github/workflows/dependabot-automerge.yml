name: Dependabot auto-merge

# Auto-merges Dependabot PRs for minor + patch GitHub Actions updates.
#
# Why a workflow and not a dependabot.yml setting? Dependabot's config (version 2)
# has no auto-merge option — GitHub's documented way to auto-merge Dependabot PRs is
# this Actions recipe (dependabot/fetch-metadata + `gh pr merge --auto`). See:
#   https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions
#
# `gh pr merge --auto` only enables GitHub auto-merge; the required `ci` status check
# must go green before the PR actually merges, so nothing lands on a red pipeline.
# Majors arrive as separate PRs (see dependabot.yml) and are left for a human.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for minor and patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
